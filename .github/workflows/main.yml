name: GHCR CI

on:
  workflow_dispatch:       # 手动运行
  push:
    branches: [main]       # 推送 main 分支时自动运行

permissions:
  contents: read
  packages: write          # 必须！否则无法推送 GHCR 镜像

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 统一小写命名空间和仓库名（避免 GHCR 大小写问题）
      - name: Compute lowercase owner/repo
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER@L}" >> $GITHUB_ENV
          echo "REPO_LC=$(echo ${GITHUB_REPOSITORY##*/} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 3. 可选：读取版本号（如果没有 version.txt，这一步可以删除）
      - name: Read version from file
        id: version
        run: echo "VERSION=$(grep -Eo 'version=.*' version.txt | cut -d= -f2 || echo latest)" >> $GITHUB_OUTPUT

      # 4. 登录 GHCR（使用 PAT）
      - name: Log in to GHCR (PAT)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      # 5. 设置 Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. 构建并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/${{ env.REPO_LC }}:latest
            ghcr.io/${{ env.OWNER_LC }}/${{ env.REPO_LC }}:${{ steps.version.outputs.VERSION }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
